<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'none'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self';" />
  <title>Jira Attachment Downloader</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <header class="hero">
      <svg class="hero-icon" viewBox="0 0 1024 1024" width="54" height="54" xmlns="http://www.w3.org/2000/svg" aria-label="App logo">
        <defs>
          <linearGradient id="hbg" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
            <stop offset="0" stop-color="#6366f1"/>
            <stop offset="1" stop-color="#8b5cf6"/>
          </linearGradient>
          <linearGradient id="hpaper" x1="360" y1="240" x2="700" y2="740" gradientUnits="userSpaceOnUse">
            <stop offset="0" stop-color="#ffffff"/>
            <stop offset="1" stop-color="#e6e8fb"/>
          </linearGradient>
          <linearGradient id="harrow" x1="512" y1="440" x2="512" y2="680" gradientUnits="userSpaceOnUse">
            <stop offset="0" stop-color="#6366f1"/>
            <stop offset="1" stop-color="#8b5cf6"/>
          </linearGradient>
        </defs>
        <rect x="80" y="80" width="864" height="864" rx="200" fill="url(#hbg)"/>
        <path d="M372 250 h196 a24 24 0 0 1 17 7 l104 104 a24 24 0 0 1 7 17 v366 a40 40 0 0 1 -40 40 H372 a40 40 0 0 1 -40 -40 V290 a40 40 0 0 1 40 -40 Z" fill="url(#hpaper)"/>
        <path d="M566 253 v91 a20 20 0 0 0 20 20 h91 Z" fill="#c7d2fe"/>
        <g stroke="url(#harrow)" stroke-width="48" stroke-linecap="round" stroke-linejoin="round" fill="none">
          <line x1="512" y1="440" x2="512" y2="642"/>
          <polyline points="426,558 512,644 598,558"/>
        </g>
        <line x1="424" y1="712" x2="600" y2="712" stroke="#a5b4fc" stroke-width="42" stroke-linecap="round"/>
      </svg>
      <div>
        <h1>Jira Attachment Downloader</h1>
        <p>Grab every attachment from a Jira Cloud project in one click.</p>
      </div>
    </header>

    <main class="grid">
      <section class="card">
        <h2>1 · Connect to Jira</h2>

        <label class="field">
          <span>Jira site URL</span>
          <input id="site" type="text" placeholder="yourcompany.atlassian.net" autocomplete="off" />
        </label>

        <label class="field">
          <span>Email</span>
          <input id="email" type="email" placeholder="you@company.com" autocomplete="off" />
        </label>

        <label class="field">
          <span>API token</span>
          <input id="token" type="password" placeholder="Paste your Atlassian API token" autocomplete="off" />
          <small class="hint">
            Create one at <span class="link" id="tokenLink">id.atlassian.com → Security → API tokens</span>
          </small>
        </label>

        <button id="testBtn" class="btn ghost">Test connection</button>
        <div id="testResult" class="status-line"></div>
      </section>

      <section class="card">
        <h2>2 · Choose project &amp; folder</h2>

        <label class="field">
          <span>Project key(s)</span>
          <input id="project" type="text" placeholder="e.g. ABC  or  ABC, DEV, OPS" autocomplete="off" />
          <small class="hint">Type keys, or pick from your project list below.</small>
        </label>

        <button id="loadProjectsBtn" class="btn ghost small inline-btn">Load my projects</button>
        <span id="projectsStatus" class="status-line inline-status"></span>

        <div id="projectsPanel" class="projects-panel hidden">
          <input id="projectFilter" type="text" class="project-filter" placeholder="Filter projects…" autocomplete="off" />
          <div id="projectsList" class="projects-list"></div>
        </div>

        <div class="date-row">
          <label class="field">
            <span>From date <em>(optional)</em></span>
            <input id="dateFrom" type="date" />
          </label>
          <label class="field">
            <span>To date <em>(optional)</em></span>
            <input id="dateTo" type="date" />
          </label>
        </div>
        <small class="hint date-hint">Filters by the attachment's upload date. Leave blank for all dates.</small>

        <label class="field">
          <span>Download to</span>
          <div class="folder-row">
            <input id="folder" type="text" placeholder="No folder selected" readonly />
            <button id="folderBtn" class="btn ghost small">Browse…</button>
          </div>
        </label>

        <label class="checkbox">
          <input id="groupByIssue" type="checkbox" checked />
          <span>Organize into a subfolder per issue</span>
        </label>

        <button id="downloadBtn" class="btn primary">Download all attachments</button>
        <button id="cancelBtn" class="btn danger hidden">Cancel</button>
      </section>
    </main>

    <section class="card progress-card">
      <div class="progress-head">
        <h2>Progress</h2>
        <span id="counter" class="counter"></span>
      </div>
      <div class="progress-track">
        <div id="progressBar" class="progress-bar"></div>
      </div>
      <div id="currentItem" class="current-item">Idle — ready when you are.</div>
      <div id="log" class="log"></div>
    </section>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
